<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <linearGradient id="trendGradient" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <filter id="smoothShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#10b981" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="500" height="500" rx="100" fill="#09090b"/>

  <g filter="url(#smoothShadow)">
    <circle cx="250" cy="230" r="140" fill="none" stroke="url(#trendGradient)" stroke-width="14" stroke-dasharray="30 15" opacity="0.4" />
    <circle cx="250" cy="230" r="90" fill="none" stroke="url(#trendGradient)" stroke-width="8" opacity="0.2" />

    <path d="M160 310 L220 220 L290 270 L350 140" fill="none" stroke="url(#trendGradient)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
    
    <circle cx="350" cy="140" r="22" fill="#ffffff" />
    <circle cx="350" cy="140" r="12" fill="#06b6d4" />
  </g>

  <text x="250" y="440" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="42" fill="#ffffff" letter-spacing="2">
    TREND<tspan fill="url(#trendGradient)">SPOT</tspan>
  </text>
</svg>
